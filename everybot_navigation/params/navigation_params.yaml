# clabil_250903_v2.2
amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.08 #0.12 #0.08 # 로봇의 회전 운동 모델에 대한 노이즈. 로봇이 회전할 때 예측 오차. 값이 높을수록 노이즈 큼.
    alpha2: 0.08 #0.12 #0.08 # 로봇의 직진 운동 모델이 대한 노이즈. 로봇이 직진할 때 예측 오차. 값이 높을수록 노이즈 큼.
    alpha3: 0.12 #0.15 #0.12 # 로봇의 회전 운동 모델에 대한 노이즈. 로봇이 회전할 때 측정된 회전량에 대한 오차. 값이 클수록 노이즈 큼.
    alpha4: 0.08 #0.12 #0.08 # 로봇의 직진 운동 모델에 대한 노이즈. 로봇이 직진할 때 측정된 이동량에 대한 오차. 값이 클수록 노이즈 큼.
    alpha5: 0.1 # 로봇의 회전 운동 모델에 대한 노이즈. 로봇이 회전할 때 측정된 화전량에 대한 비선형성. 값이 클수록 노이즈 큼.

    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false #true #false
    global_frame_id: "map"
    lambda_short: 0.1

    laser_likelihood_max_dist: 4.0 # 이 거리보다 먼 라이다 데이터는 위치추정에 사용하지 않는다.

    laser_max_range: 10.0
    laser_min_range: 0.0

    laser_model_type: "likelihood_field"
    max_beams: 100
    max_particles: 2000
    min_particles: 200

    odom_frame_id: "odom"

    pf_err: 0.1 #0.02 #0.1 # 입자 필터의 위치추정 오차. 낮으면 위치 추정 정확도 높아지긴 하나 계산비용도 높아짐
    pf_z: 0.99 # 입자필터의 재샘플링 가중치. 높은 값일수록 입자 중요도에 따른 재샘플링이 더 강조됨.

    recovery_alpha_fast: 0.001 # 빠른 회복 모드에서 사용하는 값. 회복 모드는 위치 추정에 문제가 있을 때 로봇이 회복하는 방법을 지정.
    recovery_alpha_slow: 0.01 # 느린 회복 모드에서 사용하는 회복 알파 값.

    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5

    sigma_hit: 0.1 # 레이저 스캐너에서의 측정값과 예상값 사이의 표준 편차.

    tf_broadcast: true
    transform_tolerance: 0.5 #0.3

    update_min_a: 0.1 #0.05 #0.017  #0.1 # 로봇의 각도 변화가 일정 값보다 큰 경우 위치 추정 수행.
    update_min_d: 0.02 #0.05 #0.2 # 로봇의 이동변화가 일정 값보다 큰 경우 위치 추정을 수행.

    z_hit: 0.9
    z_max: 0.05
    z_rand: 0.1
    z_short: 0.05

    scan_topic: /scan

    #set_initial_pose: true
    #initial_pose.x : 0.0
    #initial_pose.y : 0.0
    #initial_pose.z : 0.0
    #initial_pose.yaw : 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

