global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.19
      width: 100
      height: 100
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        footprint_clearing_enabled: false
        enabled: True
        min_obstacle_height: -3.0
        max_obstacle_height: 10.0
        observation_sources: scan # perception keepout_zones
        scan:
          topic: /scan
          min_obstacle_height: -3.0
          max_obstacle_height: 10.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.17
          obstacle_max_range: 2.0
          obstacle_min_range: 0.17
          observation_persistence: 0.0

        # perception:
        #   sensor_frame: map
        #   topic: /perception/output
        #   min_obstacle_height: -3.0
        #   max_obstacle_height: 10.0
        #   clearing: True
        #   marking: True
        #   data_type: "PointCloud2"
        #   raytrace_max_range: 10.0
        #   raytrace_min_range: 0.0
        #   obstacle_max_range: 100.0
        #   obstacle_min_range: 0.0
        #   observation_persistence: 0.0

        # keepout_zones:
        #   topic: /A1_keepout/point_cloud
        #   sensor_frame: "map"
        #   max_obstacle_height: 2.0
        #   min_obstacle_height: -2.0
        #   clearing: True
        #   marking: True
        #   data_type: "PointCloud2"
        #   raytrace_max_range: 10.0
        #   raytrace_min_range: 0.0
        #   obstacle_max_range: 100.0
        #   obstacle_min_range: 0.0
        #   observation_persistence: 5.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.45
      always_send_full_costmap: True
      unknown_cost_value: 255
      track_unknown_space: True
      lethal_cost_threshold: 254
      filters: ["keepout_filter"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/keepout_costmap_filter_info"
        mask_topic: "/keepout_filter_mask"

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.196
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    # recovery_plugins: ["spin", "backup"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    # max_rotational_vel: 0.3
    # min_rotational_vel: 0.2
    max_rotational_vel: 0.6
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_patience: 5.0
    replanning: true
    use_sim_time: False
    planner_plugins: ["GridBased", "GridBasedMapping"]
    # [26.07.15] A1_path_planner / wm_theta_star_planner (외부 커스텀 패키지) 제거.
    # nav2 기본 theta_star 로 대체 - 파라미터 이름 동일 (wm_ 은 nav2 fork 였음).
    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      allow_unknown: false
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 8.0 # 4.0 [25.12.09] hyjoe: costmap을 침범하는 경로 생성을 방지하기 위해 가중치 증가 (4 -> 8)
      w_heuristic_cost: 1.0
    GridBasedMapping: # 맵핑 중 주행용 (미지영역 통과 허용)
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      allow_unknown: true
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 8.0
      w_heuristic_cost: 1.0

smoother_server:
  ros__parameters:
    use_sim_time: False
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap
    robot_base_frame: base_link
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      w_data: 0.2 # 원래경로 보존 수치(default: 0.2)
      w_smooth: 0.5 # 매끄러움 가중치 (default: 0.3)
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    use_sim_time: False
    simulate_ahead_time: 2.0
    # max_rotational_vel: 0.3
    # min_rotational_vel: -0.1

    max_rotational_vel: 0.6
    min_rotational_vel: -0.6

    rotational_acc_lim: 1.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.4, 0.0, 0.6]
    min_velocity: [-0.4, 0.0, -0.6]
    max_accel: [0.25, 0.0, 1.0] #[2.5, 0.0, 10.0]
    max_decel: [-0.25, 0.0, -1.0] #[-2.5, 0.0, -10.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
