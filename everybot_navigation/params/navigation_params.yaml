# bt_navigator_navigate_through_poses_rclcpp_node:
#   ros__parameters:
#     use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    controller_patience: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 10.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5 #0.25
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 3.14
    # DWB parameters
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      angular_dist_threshold: 0.785 #0.785
      angular_disengage_threshold: 0.2 # SKIX jslee, Added angular disengage threshold
      forward_sampling_distance: 0.3

      # rotate_to_heading_angular_vel: 1.0
      rotate_to_heading_angular_vel: 1.0

      max_angular_accel: 5.0
      simulate_ahead_time: 1.0 #1.0
      debug_trajectory_details: True
      #min_vel_x: 0.08
      min_vel_x: 0.1
      min_vel_y: 0.0
      max_vel_x: 0.4
      max_vel_y: 0.0
      max_vel_theta: 1.0 #0.8
      min_speed_xy: 0.05
      max_speed_xy: 0.45
      min_speed_theta: 0.2
      # Add high threshold velocity for turtlebot 3 issue.
      # https://github.com/ROBOTIS-GIT/turtlebot3_simulations/issues/75
      acc_lim_x: 0.25 #2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.0 #10.0
      # decel_lim_x: -0.25 #-2.5
      decel_lim_x: -1.0 #-2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.0 #-10.0
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3

      #xy_goal_tolerance: 0.1
      xy_goal_tolerance: 0.05

      trans_stopped_velocity: 0.2
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      BaseObstacle.scale: 0.5 #0.02
      PathAlign.scale: 64.0
      PathAlign.forward_point_distance: 0.3
      PathDist.scale: 16.0
      GoalAlign.scale: 10.0
      GoalAlign.forward_point_distance: 0.3
      GoalDist.scale: 10.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.19
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.45
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 5.0 # 5 (linear: seconds / exponential: e^n)
        decay_model: 0 # 0: linear, 1: exponential, -1: persistent
        voxel_size: 0.05 # meter
        track_unknown_space: true # default space is known
        unknown_threshold: 15
        mark_threshold: 0 # (Obstacle detection requires at least n data points to overlap)
        update_footprint_enabled: true # clear footprint
        combination_method: 1 # 1: max, 0: override
        origin_z: 0.0 # meters
        publish_voxel_map: true # default off (false)
        transform_tolerance: 0.2 # seconds (tf delay tolerance)
        mapping_mode: false # default off, saves map not for navigation
        map_save_duration: 60.0 # default 60s, how often to autosave
        observation_sources: > # seperate mark/clear
          tof_mono_mark tof_mono_clear
          depth_camera_mark depth_camera_clear
          camera_mark camera_clear
          bottom_ir_mark bottom_ir_clear
          collision_front_mark collision_front_clear
          collision_rear_mark collision_rear_clear
          tof_left_0_mark tof_left_0_clear tof_left_3_mark tof_left_3_clear tof_left_6_mark tof_left_6_clear
          tof_left_17_mark tof_left_17_clear tof_left_20_mark tof_left_20_clear tof_left_23_mark tof_left_23_clear
          tof_left_28_mark tof_left_28_clear tof_left_31_mark tof_left_31_clear
          tof_left_44_mark tof_left_44_clear tof_left_47_mark tof_left_47_clear
          tof_left_49_mark tof_left_49_clear tof_left_52_mark tof_left_52_clear tof_left_55_mark tof_left_55_clear
          tof_left_57_mark tof_left_57_clear tof_left_60_mark tof_left_60_clear tof_left_63_mark tof_left_63_clear
          tof_right_1_mark tof_right_1_clear tof_right_4_mark tof_right_4_clear tof_right_7_mark tof_right_7_clear
          tof_right_16_mark tof_right_16_clear tof_right_19_mark tof_right_19_clear tof_right_22_mark tof_right_22_clear
          tof_right_24_mark tof_right_24_clear tof_right_27_mark tof_right_27_clear
          tof_right_40_mark tof_right_40_clear tof_right_43_mark tof_right_43_clear
          tof_right_48_mark tof_right_48_clear tof_right_51_mark tof_right_51_clear tof_right_54_mark tof_right_54_clear
          tof_right_56_mark tof_right_56_clear tof_right_59_mark tof_right_59_clear tof_right_62_mark tof_right_62_clear

        # --- Tof Mono ---
        tof_mono_mark:
          data_type: PointCloud2 # PointCloud2 / LaserScan
          topic: /sensor_to_pointcloud/tof/mono/local
          marking: true
          clearing: false
          obstacle_range:
            2.0 # default 2.5 | meters
            # 센서로부터 이 거리 이내에 있는 데이터만 실제 장애물로 레이어에 추가
          min_obstacle_range:
            0.0 # default 0.0 | meters
            # 센서로부터 이 거리보다 가까운 데이터는 노이즈 또는 본체 간섭으로 간주하여 무시
          min_obstacle_height:
            0.10 # default 0.0 | meters
            # 장애물로 인식할 최소 높이 | 바닥면(Ground) 입자나 노이즈를 장애물로 오인하지 않도록 10cm 이상의 데이터만 사용
          max_obstacle_height:
            3.0 # default 3.0 | meters
            # 장애물로 인식할 최대 높이 | 3m 이상의 물체는 무시 (천장 등)
          expected_update_rate:
            0.0 # default 0.0 | 0.0 -> 데이터 지연이여도 무조건 사용
            # 센서가 이 주기(sec)로 데이터를 보내지 않으면, 해당 센서의 데이터를 지도에서 제거
            # (예: 0.1 설정 시 0.1초 이상 데이터가 없으면 제거)
          observation_persistence:
            0.0 # default 0.0 | 0.0 -> 최근 데이터만 남기고 다른 데이터 모두 buffer 에서 제거
            # 센서 데이터의 유지 시간 (초). 0.0이면 현재 시간 기준 최근 데이터만 사용, 1.0이면 1초 동안의 데이터를 모두 유지
          inf_is_valid:
            false # default false
            # for LaserScan | 센서 값 중 inf(무한대)가 들어올 때 이를 유효한 값으로 처리할지 여부
          filter:
            "passthrough" # default passthrough
            # 센서 데이터에 적용할 필터 종류 | passthrough: 설정된 범위(Z축 등) 내의 값만 통과, voxel: 복셀 필터 적용 (연산량 줄임)
          voxel_min_points:
            0 # default 0
            # 복셀 필터 사용 시, 하나의 복셀에 포함되어야 하는 최소 데이터 포인트 수
          clear_after_reading:
            true # default false
            # 센서가 데이터를 읽은 후 버퍼를 비울지 여부 (최신성 유지를 위해 보통 true로 설정)
        tof_mono_clear:
          data_type: PointCloud2 # PointCloud2 / LaserScan
          topic: /sensor_to_pointcloud/tof/mono/local
          marking: false
          clearing: true
          min_z:
            0.1 # default 0.0 | meters
            # 클리어링을 수행할 수직 범위 최소 높이
          max_z:
            3.0 # default 10.0 | meters
            # 클리어링을 수행할 수직 범위 최대 높이
          model_type:
            0 # default 0 | 0: depth camera, 1: 3d lidar like VLP16 or similar
            # 센서 모델 타입 | 0: 일반 카메라 - frustum 형식의 fov, 1: 3D 라이다 (VLP16 등) - 여러개의 레이저 빔이 위아래로 층을 이루어 회전하는 방식
          vertical_fov_angle:
            0.1047 # default 0.7 | radians ( 6 deg )
            # 클리어링을 수행할 수직 시야각 (라디안)
          horizontal_fov_angle:
            0.1047 # default 1.04 | radians ( 6 deg )
            # 클리어링을 수행할 수평 시야각 (라디안)

        # --- Depth Camera (M4.51s, sensor_manager 가 바닥 제거된 map frame cloud 발행) ---
        depth_camera_mark:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/depth_camera/local
          marking: true
          clearing: false
          obstacle_range: 2.0 # sensor_param.yaml conversion.range_max 와 일치
          min_obstacle_range: 0.16 # conversion.range_min 과 일치 (본체/근접 노이즈 무시)
          min_obstacle_height: 0.03 # RANSAC 이후 잔여 바닥 노이즈 컷
          max_obstacle_height: 0.6 # sensor_param.yaml height_crop.max_z 와 일치
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel" # 포인트 수 많으므로 voxel 필터로 연산량 절감
          voxel_min_points: 2 # 고립 노이즈 포인트 제거
          clear_after_reading: true
        depth_camera_clear:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/depth_camera/local
          marking: false
          clearing: true
          min_z: 0.03
          max_z: 0.6
          model_type: 0 # depth camera frustum
          # M4.51s FOV 실측값으로 보정 필요 (아래는 일반적인 depth cam 근사치)
          vertical_fov_angle: 0.96 # ~55 deg
          horizontal_fov_angle: 1.31 # ~75 deg

        # --- Camera ---
        camera_mark:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/camera_object/local
          marking: true
          clearing: false
          obstacle_range: 3.0
          min_obstacle_range: 0.0
          max_obstacle_height: 1.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "passthrough"
          voxel_min_points: 0
          clear_after_reading: true
        camera_clear:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/camera_object/local
          marking: false
          clearing: true
          min_z: 0.1
          max_z: 5.0
          model_type: 0
          vertical_fov_angle: 0.8745 # 50 deg
          horizontal_fov_angle: 1.50098 # 86 deg

        # --- Bottom IR ---
        bottom_ir_mark:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/bottom_ir/local
          marking: true
          clearing: false
          obstacle_range: 0.5
          min_obstacle_range: 0.0
          max_obstacle_height: 0.1
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "passthrough"
          voxel_min_points: 0
          clear_after_reading: true
        bottom_ir_clear:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/bottom_ir/local
          marking: false
          clearing: true
          min_z: 0.0
          max_z: 0.1
          model_type: 0
          vertical_fov_angle: 0.1047 # 6 deg
          horizontal_fov_angle: 0.1047 # 6 deg

        # --- Collision ---
        collision_front_mark:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/collision/front/local
          marking: true
          clearing: false
          obstacle_range: 0.5
          min_obstacle_range: 0.0
        collision_front_clear:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/collision/front/local
          marking: false
          clearing: true
          max_z: 1.0
          model_type: 0
        collision_rear_mark:
          data_type: PointCloud2
          topic: /sensor_to_pointcloud/collision/rear/local
