######     Class ID      #######
#
#        00: 케이블
#        01: 카펫
#        02: 옷, 수건, 양말
#        03: 액체
#        04: 비장애물
#        05: 장애물
#        06: 동물 대변
#        07: 체중계
#        08: 문턱
#        09: 사람
#        10: 개
#        11: 고양이
#        12: 의자
#        13: 선풍기, 원형책상, 기둥, 전등기둥
#        14: 신발
#        15: 전자기기 (노트북, 태블릿, 스마트폰)
#        16: 건조대
